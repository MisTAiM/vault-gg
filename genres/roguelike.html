<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Roguelike & Roguelite Games — VAULT.GG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
<link rel="stylesheet" href="../css/style.css">
<style>
.genre-hero{background:linear-gradient(135deg,var(--raised) 0%,rgba(244,63,94,.1) 100%);border-bottom:1px solid var(--b1);padding:72px 0 52px}
.genre-accent{color:#f43f5e;text-shadow:0 0 20px #f43f5e55}
.genre-icon{width:64px;height:64px;border-radius:var(--r3);background:rgba(244,63,94,.12);
  border:1px solid rgba(244,63,94,.3);display:flex;align-items:center;justify-content:center;
  font-size:28px;color:#f43f5e;margin-bottom:20px}
.gcard{cursor:pointer}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="../index.html" style="display:flex;align-items:center;gap:0;text-decoration:none">
      <img src="../logo.svg" alt="VAULT.GG" height="28" style="display:block" onerror="this.style.display='none'">
    </a>
    <ul class="nav-links">
      <li><a class="nav-link" href="../index.html">Home</a></li>
      <li><a class="nav-link active" href="../genres/">Genres</a></li>
      <li><a class="nav-link" href="../guides.html">Guides</a></li>
      <li><a class="nav-link" href="../upcoming.html">Upcoming</a></li>
      <li><a class="nav-link" href="../esports.html">Esports</a></li>
      <li><a class="nav-link" href="../borderlands.html">Borderlands</a></li>
    </ul>
    <div class="nav-search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="search" id="searchInput" placeholder="Search..." autocomplete="off">
    </div>
  </div>
</nav>
<div class="genre-hero">
  <div class="wrap">
    <div class="genre-icon"><i class="fa-solid fa-dice-d20"></i></div>
    <h1 class="page-title"><span class="genre-accent">Roguelike & Roguelite</span></h1>
    <p class="sec-sub" style="margin-top:8px">Permadeath, procedural generation, run-based progression — every death is a lesson</p>
    <p style="margin-top:16px"><a class="btn btn-ghost btn-sm" href="../genres/">&#8592; All Genres</a></p>
  </div>
</div>
<section class="section">
  <div class="wrap">
    <div class="game-grid" id="genreGrid"></div>
  </div>
</section>
<footer class="footer">
  <div class="wrap">
    <div class="footer-inner">
      <a class="footer-logo" href="../index.html">VAULT<em>.GG</em></a>
      <p class="footer-copy">Best Roguelike & Roguelite games on PC — curated. March 2026.</p>
      <nav class="footer-links">
        <a href="../genres/"><i class="fa-solid fa-list"></i>All Genres</a>
        <a href="../guides.html"><i class="fa-solid fa-scroll"></i>Guides</a>
      </nav>
    </div>
  </div>
</footer>
<div class="video-modal" id="videoModal">
  <div class="video-header"><div class="video-title" id="videoTitle"></div>
    <button class="video-close" onclick="closeVideo()"><i class="fa-solid fa-xmark"></i></button></div>
  <div class="video-wrap"><iframe id="videoFrame" src="" frameborder="0" allowfullscreen allow="autoplay;encrypted-media"></iframe></div>
</div>
<div class="modal-back" id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <img class="modal-img" id="modalImg" src="" alt="" onerror="this.style.display='none'">
    <div class="modal-body">
      <div class="modal-top">
        <div><div class="modal-genre-tag" id="modalGenre"></div><h2 class="modal-title-text" id="modalTitle"></h2></div>
        <button class="modal-close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="overview" onclick="setModalTab('overview')"><i class="fa-solid fa-circle-info"></i>Overview</button>
        <button class="modal-tab" id="tabAchievements" data-tab="achievements" onclick="setModalTab('achievements')"><i class="fa-solid fa-shield-halved"></i>Achievements</button>
        <button class="modal-tab" id="tabVideo" data-tab="video" onclick="setModalTab('video')"><i class="fa-solid fa-play"></i>Gameplay</button>
        <button class="modal-tab" id="tabScreenshots" data-tab="screenshots" onclick="setModalTab('screenshots')" style="display:none"><i class="fa-solid fa-images"></i>Gallery</button>
        <button class="modal-tab" id="tabMods" data-tab="mods" onclick="setModalTab('mods')" style="display:none"><i class="fa-solid fa-puzzle-piece"></i>Mods</button>
        <button class="modal-tab" id="tabPrices" data-tab="prices" onclick="setModalTab('prices')" style="display:none"><i class="fa-solid fa-tag"></i>Prices</button>
      </div>
      <div id="modalTabBody"></div>
    </div>
  </div>
</div>
<script src="../js/data.js"></script>
<script>
const TIER_MAP = {S:'tier-s',A:'tier-a',B:'tier-b',C:'tier-c'};
(function() {
  const grid = document.getElementById('genreGrid');
  const cat = 'roguelike';
  const seen = new Set();
  const games = GAMES.filter(function(g){ return g.cat && g.cat.includes(cat) && !seen.has(g.id) && seen.add(g.id); });
  if (!games.length) { grid.innerHTML = '<p style="color:var(--t3);padding:40px 0">No games tagged yet.</p>'; return; }
  games.forEach(function(g) {
    const el = document.createElement('div');
    el.className = 'game-card';
    el.onclick = function(e) { if (e.target.closest('.card-play-btn')) return; openModal(g.id); };
    const imgSrc = (g.imgUrl && g.imgUrl !== 'null') ? g.imgUrl : (g.steam ? 'https://cdn.cloudflare.steamstatic.com/steam/apps/' + g.steam + '/header.jpg' : '');
    const tierCls = TIER_MAP[g.tier] || 'tier-c';
    const playBtn = g.yt ? '<button class="card-play-btn" onclick="event.stopPropagation();openVideo('' + g.yt + '','' + g.title.replace(/'/g,"\'") + '')"><i class="fa-solid fa-play"></i></button>' : '';
    el.innerHTML = '<div class="card-img-wrap"><img class="card-img" src="' + imgSrc + '" alt="' + g.title + '" loading="lazy" onerror="this.style.opacity='.3'">' + playBtn + '<span class="card-tier ' + tierCls + '">' + (g.tier||'?') + '</span></div>'
      + '<div class="card-body"><div class="card-genre">' + g.genre + '</div><div class="card-title">' + g.title + '</div>'
      + '<div class="card-foot"><span class="card-dev">' + g.dev + '</span>'
      + (g.score ? '<span class="card-score"><i class="fa-solid fa-star"></i>' + g.score + '</span>' : '') + '</div>'
      + (g.hltb && g.hltb.main ? '<div class="card-hltb"><i class="fa-regular fa-clock"></i>' + g.hltb.main + 'h main</div>' : '') + '</div>';
    grid.appendChild(el);
  });
})();
</script>
<script src="../js/app.js"></script>
</body>
</html>
