<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Vault icon: stylized lock/vault door -->
  <g transform="translate(0,4)">
    <!-- Outer vault circle -->
    <circle cx="20" cy="20" r="18" stroke="#00ff88" stroke-width="1.5" fill="none" opacity="0.9"/>
    <!-- Inner ring -->
    <circle cx="20" cy="20" r="13" stroke="#00ff88" stroke-width="0.75" fill="none" opacity="0.5"/>
    <!-- Vault spokes (like a real vault door) -->
    <line x1="20" y1="7" x2="20" y2="33" stroke="#00ff88" stroke-width="0.75" opacity="0.4"/>
    <line x1="7" y1="20" x2="33" y2="20" stroke="#00ff88" stroke-width="0.75" opacity="0.4"/>
    <line x1="10.6" y1="10.6" x2="29.4" y2="29.4" stroke="#00ff88" stroke-width="0.75" opacity="0.3"/>
    <line x1="29.4" y1="10.6" x2="10.6" y2="29.4" stroke="#00ff88" stroke-width="0.75" opacity="0.3"/>
    <!-- Central lock core -->
    <circle cx="20" cy="20" r="5" fill="#00ff88" opacity="0.9"/>
    <circle cx="20" cy="20" r="3" fill="#07080a"/>
    <!-- Keyhole -->
    <circle cx="20" cy="19" r="1.5" fill="#00ff88"/>
    <rect x="19.2" y="19.5" width="1.6" height="3" rx="0.3" fill="#00ff88"/>
    <!-- Glow effect -->
    <circle cx="20" cy="20" r="18" stroke="#00ff88" stroke-width="3" fill="none" opacity="0.06"/>
  </g>
  
  <!-- VAULT wordmark -->
  <text x="50" y="32" 
    font-family="'Bebas Neue', 'Arial Black', sans-serif" 
    font-size="32" 
    font-weight="900"
    letter-spacing="3"
    fill="#f0f0f4">VAULT</text>
  
  <!-- .GG in neon green -->
  <text x="147" y="32"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="32"
    font-weight="900" 
    letter-spacing="1"
    fill="#00ff88"
    filter="url(#neonGlow)">.GG</text>
  
  <!-- Neon glow filter -->
  <defs>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow on vault icon -->
    <filter id="vaultGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
